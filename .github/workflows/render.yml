name: Render Automato Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: npm ci

      - name: Compile Pipeline
        run: python compile_pipeline.py

      - name: Render Video
        run: npx remotion render EducationalVideo out.mp4 --props=dist/render_props.json

      - name: Upload Output Video
        uses: actions/upload-artifact@v4
        with:
          name: automato-video
          path: out.mp4
